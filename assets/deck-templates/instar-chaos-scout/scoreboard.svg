<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Warm paper ground -->
  <rect width="1280" height="720" fill="#F9F7F2"/>

  <!-- Graph-paper grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1B1F2A" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Page title -->
  <text x="60" y="70" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#2438E0">Scoreboard</text>
  <line x1="60" y1="85" x2="1220" y2="85" stroke="#2438E0" stroke-width="0.5"/>
  <text x="60" y="115" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#55596A">Recommendations &#x00D7; four sliders &#x2014; the shape is the information</text>

  <!-- Table header -->
  <rect x="60" y="140" width="1160" height="40" fill="#2438E0" fill-opacity="0.08"/>
  <line x1="60" y1="140" x2="1220" y2="140" stroke="#2438E0" stroke-width="0.5"/>
  <line x1="60" y1="180" x2="1220" y2="180" stroke="#2438E0" stroke-width="1"/>

  <text x="80" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">CODE</text>
  <text x="150" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">RECOMMENDATION</text>
  <text x="620" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">FEASIBILITY</text>
  <text x="790" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">EVIDENCE</text>
  <text x="940" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">IMPACT</text>
  <text x="1070" y="167" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="1">DISRUPTION</text>

  <!-- Track A header -->
  <rect x="60" y="180" width="1160" height="30" fill="#2438E0" fill-opacity="0.04"/>
  <text x="80" y="200" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#2438E0" letter-spacing="2">TRACK A &#x2014; REALISTIC</text>
  <line x1="60" y1="210" x2="1220" y2="210" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Row A1 -->
  <text x="80" y="240" font-family="Consolas, 'Courier New', monospace" font-size="18" font-weight="700" fill="#2438E0">[A1]</text>
  <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{rec_a1_title}</text>
  <!-- Slider strip: 5 cells -->
  <rect x="620" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="644" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="668" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="692" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="716" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <!-- Evidence -->
  <rect x="790" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="814" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="838" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="862" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="886" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <!-- Impact -->
  <rect x="940" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="964" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="988" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1012" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1036" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <!-- Disruption -->
  <rect x="1070" y="225" width="24" height="18" fill="#2438E0" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1094" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1118" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1142" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <rect x="1166" y="225" width="24" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <line x1="60" y1="255" x2="1220" y2="255" stroke="#E3E1DC" stroke-width="0.5"/>

  <!-- Row A2 (placeholder) -->
  <text x="80" y="285" font-family="Consolas, 'Courier New', monospace" font-size="18" font-weight="700" fill="#2438E0">[A2]</text>
  <text x="150" y="285" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{rec_a2_title}</text>
  <line x1="60" y1="300" x2="1220" y2="300" stroke="#E3E1DC" stroke-width="0.5"/>

  <!-- Row A3 (placeholder) -->
  <text x="80" y="330" font-family="Consolas, 'Courier New', monospace" font-size="18" font-weight="700" fill="#2438E0">[A3]</text>
  <text x="150" y="330" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{rec_a3_title}</text>
  <line x1="60" y1="345" x2="1220" y2="345" stroke="#E3E1DC" stroke-width="0.5"/>

  <!-- Track B header -->
  <rect x="60" y="365" width="1160" height="30" fill="#EE5340" fill-opacity="0.04"/>
  <text x="80" y="385" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#EE5340" letter-spacing="2">TRACK B &#x2014; METAMORPHOSIS</text>
  <line x1="60" y1="395" x2="1220" y2="395" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Row B1 -->
  <text x="80" y="425" font-family="Consolas, 'Courier New', monospace" font-size="18" font-weight="700" fill="#EE5340">[B1]</text>
  <text x="150" y="425" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{rec_b1_title}</text>
  <!-- Slider strips in madder-red -->
  <rect x="620" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="644" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="668" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="692" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="716" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <!-- Evidence -->
  <rect x="790" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="814" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="838" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="862" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="886" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <!-- Impact -->
  <rect x="940" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="964" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="988" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1012" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1036" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <!-- Disruption -->
  <rect x="1070" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1094" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1118" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1142" y="410" width="24" height="18" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1166" y="410" width="24" height="18" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <line x1="60" y1="440" x2="1220" y2="440" stroke="#E3E1DC" stroke-width="0.5"/>

  <!-- Row B2 -->
  <text x="80" y="470" font-family="Consolas, 'Courier New', monospace" font-size="18" font-weight="700" fill="#EE5340">[B2]</text>
  <text x="150" y="470" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{rec_b2_title}</text>
  <line x1="60" y1="485" x2="1220" y2="485" stroke="#E3E1DC" stroke-width="0.5"/>

  <!-- Legend -->
  <line x1="60" y1="530" x2="1220" y2="530" stroke="#2438E0" stroke-width="0.5"/>
  <text x="80" y="560" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Each cell = 1 point (1&#x2013;5). Do not average &#x2014; the shape of the four values is the information.</text>
  <rect x="80" y="575" width="18" height="14" fill="#2438E0"/>
  <text x="110" y="587" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Track A (Realistic)</text>
  <rect x="300" y="575" width="18" height="14" fill="#EE5340"/>
  <text x="330" y="587" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Track B (Metamorphosis)</text>

  <!-- Bottom rule -->
  <line x1="60" y1="620" x2="1220" y2="620" stroke="#2438E0" stroke-width="0.5"/>
  <text x="60" y="650" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Fig. 2 &#x2014; Recommendation scoreboard</text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93" text-anchor="end">{page}</text>
</svg>
