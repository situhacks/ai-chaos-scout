<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Warm paper ground -->
  <rect width="1280" height="720" fill="#f4efe4"/>

  <!-- Graph-paper grid (6% opacity specimen-blue) -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f3a5f" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Top hairline rule -->
  <line x1="60" y1="60" x2="1220" y2="60" stroke="#1f3a5f" stroke-width="0.5"/>

  <!-- Specimen-blue decorative bracket (left) -->
  <line x1="60" y1="60" x2="60" y2="200" stroke="#1f3a5f" stroke-width="1.5"/>

  <!-- Title block -->
  <text x="100" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#1f3a5f">AI Chaos Scout</text>
  <text x="100" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#1f3a5f">Weekly Chaos Briefing</text>

  <!-- Subject name placeholder -->
  <text x="100" y="310" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#2b2b2b">{subject_name}</text>

  <!-- Subject line -->
  <text x="100" y="370" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#5c5c5c">{subject_line}</text>

  <!-- Metamorphosis strip (5 stages, bottom) -->
  <!-- egg -->
  <ellipse cx="280" cy="560" rx="18" ry="24" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="280" y="610" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="middle">egg</text>

  <!-- larva -->
  <path d="M 430,545 Q 445,535 460,545 Q 475,555 490,545 Q 505,535 520,545" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="475" y="610" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="middle">larva</text>

  <!-- chrysalis -->
  <path d="M 660,535 L 670,570 L 680,535 L 690,570 L 700,535" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <ellipse cx="680" cy="555" rx="14" ry="22" fill="none" stroke="#1f3a5f" stroke-width="1"/>
  <text x="680" y="610" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="middle">chrysalis</text>

  <!-- emergence -->
  <path d="M 855,560 L 875,540 L 895,560 M 865,550 L 875,530 L 885,550" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <line x1="875" y1="560" x2="875" y2="575" stroke="#1f3a5f" stroke-width="1"/>
  <text x="875" y="610" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="middle">emergence</text>

  <!-- imago -->
  <path d="M 1050,555 L 1070,535 L 1090,555 L 1070,545 Z" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <path d="M 1050,555 L 1070,575 L 1090,555 L 1070,565 Z" fill="none" stroke="#1f3a5f" stroke-width="1.5"/>
  <text x="1070" y="610" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="middle">imago</text>

  <!-- Connecting arrows between stages -->
  <line x1="310" y1="560" x2="420" y2="560" stroke="#d3cfc6" stroke-width="0.5"/>
  <line x1="530" y1="560" x2="645" y2="560" stroke="#d3cfc6" stroke-width="0.5"/>
  <line x1="715" y1="560" x2="840" y2="560" stroke="#d3cfc6" stroke-width="0.5"/>
  <line x1="910" y1="560" x2="1035" y2="560" stroke="#d3cfc6" stroke-width="0.5"/>

  <!-- Date placeholder (bottom-right) -->
  <text x="1220" y="680" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8a8578" text-anchor="end">{date}</text>

  <!-- Bottom hairline rule -->
  <line x1="60" y1="660" x2="1220" y2="660" stroke="#1f3a5f" stroke-width="0.5"/>
</svg>
