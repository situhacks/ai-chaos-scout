<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Soft off-white paper ground -->
  <rect width="1280" height="720" fill="#F9F7F2"/>

  <!-- Drafting grid (6% opacity ink) -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1B1F2A" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Layered oversized display word (low opacity, overlapping the composition) -->
  <text x="70" y="470" font-family="&quot;Arial Black&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif" font-size="200" font-weight="800" fill="#2438E0" fill-opacity="0.06" letter-spacing="-4">CHAOS</text>
  <text x="470" y="600" font-family="&quot;Arial Black&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif" font-size="120" font-weight="800" fill="#EE5340" fill-opacity="0.06" letter-spacing="-2">METAMORPHOSIS</text>

  <!-- Top hairline rule + monospace eyebrow -->
  <line x1="60" y1="60" x2="1220" y2="60" stroke="#E3E1DC" stroke-width="1"/>
  <text x="60" y="95" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#55596A" letter-spacing="3">AI CHAOS SCOUT // {subject_name} // {date}</text>

  <!-- Blue accent bar -->
  <rect x="60" y="140" width="64" height="10" fill="#2438E0"/>

  <!-- Title block (heavy sans, ink with color) -->
  <text x="58" y="250" font-family="&quot;Arial Black&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif" font-size="86" font-weight="800" fill="#1B1F2A" letter-spacing="-2">AI Chaos Scout</text>
  <text x="60" y="300" font-family="&quot;Arial Black&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif" font-size="30" font-weight="700" fill="#2438E0" letter-spacing="1">Weekly Chaos Briefing</text>

  <!-- Subject name + line -->
  <text x="60" y="390" font-family="&quot;Arial Black&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif" font-size="44" font-weight="800" fill="#1B1F2A">{subject_name}</text>
  <rect x="60" y="410" width="1160" height="2" fill="#EE5340"/>
  <text x="60" y="452" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#55596A">{subject_line}</text>

  <!-- Metamorphosis strip (5 stages, blue -> coral across disruption 1..5) -->
  <!-- egg (L1, blue) -->
  <ellipse cx="280" cy="585" rx="18" ry="24" fill="none" stroke="#2438E0" stroke-width="2"/>
  <text x="280" y="632" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="middle">egg</text>

  <!-- larva (L2, blue) -->
  <path d="M 430,570 Q 445,560 460,570 Q 475,580 490,570 Q 505,560 520,570" fill="none" stroke="#2438E0" stroke-width="2"/>
  <text x="475" y="632" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="middle">larva</text>

  <!-- chrysalis (L3, coral) -->
  <ellipse cx="680" cy="580" rx="16" ry="24" fill="none" stroke="#EE5340" stroke-width="2"/>
  <line x1="680" y1="556" x2="680" y2="546" stroke="#EE5340" stroke-width="1.5"/>
  <text x="680" y="632" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="middle">chrysalis</text>

  <!-- emergence (L4, coral) -->
  <path d="M 858,585 L 838,560 L 828,580" fill="none" stroke="#EE5340" stroke-width="2"/>
  <path d="M 892,585 L 912,560 L 922,580" fill="none" stroke="#EE5340" stroke-width="2"/>
  <line x1="875" y1="585" x2="875" y2="600" stroke="#EE5340" stroke-width="1.5"/>
  <text x="875" y="632" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="middle">emergence</text>

  <!-- imago (L5, coral) -->
  <path d="M 1050,580 L 1030,555 L 1020,580 L 1050,580" fill="none" stroke="#EE5340" stroke-width="2"/>
  <path d="M 1090,580 L 1110,555 L 1120,580 L 1090,580" fill="none" stroke="#EE5340" stroke-width="2"/>
  <line x1="1070" y1="560" x2="1070" y2="595" stroke="#EE5340" stroke-width="1.5"/>
  <text x="1070" y="632" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="middle">imago</text>

  <!-- Connecting arrows between stages -->
  <line x1="310" y1="585" x2="420" y2="585" stroke="#E3E1DC" stroke-width="1"/>
  <line x1="530" y1="585" x2="655" y2="585" stroke="#E3E1DC" stroke-width="1"/>
  <line x1="705" y1="585" x2="820" y2="585" stroke="#E3E1DC" stroke-width="1"/>
  <line x1="930" y1="585" x2="1015" y2="585" stroke="#E3E1DC" stroke-width="1"/>

  <!-- Bottom hairline rule + footer -->
  <line x1="60" y1="670" x2="1220" y2="670" stroke="#E3E1DC" stroke-width="1"/>
  <text x="60" y="698" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93">disruption 1 &#x2192; 5 &#xB7; Track A realistic &#xB7; Track B metamorphosis</text>
  <text x="1220" y="698" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#8A8A93" text-anchor="end">{date}</text>
</svg>
