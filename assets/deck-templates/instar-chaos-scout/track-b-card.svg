<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Warm paper ground -->
  <rect width="1280" height="720" fill="#F9F7F2"/>

  <!-- Graph-paper grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1B1F2A" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Page title (madder-red for Track B) -->
  <text x="60" y="55" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#EE5340" letter-spacing="2">TRACK B &#x2014; METAMORPHOSIS</text>
  <line x1="60" y1="65" x2="1220" y2="65" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Specimen plate card (madder-red border) -->
  <rect x="60" y="85" width="1160" height="530" fill="#FFFFFF" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Left margin warning stripe (madder-red) -->
  <rect x="60" y="85" width="4" height="530" fill="#EE5340"/>

  <!-- Card header: catalog code + title -->
  <text x="90" y="130" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#EE5340">{code}</text>
  <text x="170" y="130" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#EE5340">{title}</text>

  <!-- Level badge -->
  <text x="1190" y="130" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#EE5340" text-anchor="end">Level {disruption} &#x2014; {stage}</text>

  <!-- Hairline divider -->
  <line x1="90" y1="150" x2="1190" y2="150" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Body text -->
  <text x="90" y="185" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#1B1F2A">{body_line_1}</text>
  <text x="90" y="215" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#1B1F2A">{body_line_2}</text>

  <!-- Slider strip (4 sliders in madder-red) -->
  <line x1="90" y1="245" x2="1190" y2="245" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Feasibility slider -->
  <text x="90" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Feasibility</text>
  <rect x="210" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="240" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="270" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="300" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="330" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <text x="375" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">{feasibility}/5</text>

  <!-- Evidence slider -->
  <text x="460" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Evidence</text>
  <rect x="560" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="590" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="620" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="650" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="680" y="260" width="30" height="20" fill="none" stroke="#EE5340" stroke-width="0.5"/>
  <text x="725" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">{evidence}/5</text>

  <!-- Impact slider -->
  <text x="810" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Impact</text>
  <rect x="890" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="920" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="950" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="980" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <rect x="1010" y="260" width="30" height="20" fill="#EE5340" stroke="#EE5340" stroke-width="0.5"/>
  <text x="1055" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">{impact}/5</text>

  <!-- Disruption slider -->
  <text x="1100" y="275" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Disruption</text>

  <line x1="90" y1="290" x2="1190" y2="290" stroke="#EE5340" stroke-width="0.5"/>

  <!-- Why now -->
  <text x="90" y="325" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#EE5340">Why now</text>
  <text x="90" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{why_now_text}</text>
  <text x="90" y="375" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#EE5340">{why_now_citations}</text>

  <!-- Why us -->
  <text x="90" y="410" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#EE5340">Why us</text>
  <text x="90" y="435" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{why_us_text}</text>
  <text x="90" y="460" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#EE5340">{why_us_citations}</text>

  <!-- Metamorphosis narrative + kill criteria -->
  <line x1="90" y1="485" x2="1190" y2="485" stroke="#EE5340" stroke-width="0.5"/>
  <text x="90" y="515" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#EE5340">Metamorphosis narrative</text>
  <text x="90" y="540" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">{metamorphosis}</text>

  <!-- Kill criteria callout box -->
  <rect x="90" y="560" width="1100" height="40" fill="#EE5340" fill-opacity="0.06" stroke="#EE5340" stroke-width="0.5"/>
  <text x="105" y="585" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#EE5340">KILL CRITERIA:</text>
  <text x="255" y="585" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1B1F2A">{kill_criteria}</text>

  <!-- Stage glyph (chrysalis/emergence/imago) in bottom-right corner -->
  <!-- Imago butterfly glyph -->
  <path d="M 1140,580 L 1125,560 L 1115,580 L 1140,580" fill="none" stroke="#EE5340" stroke-width="1.5"/>
  <path d="M 1170,580 L 1185,560 L 1195,580 L 1170,580" fill="none" stroke="#EE5340" stroke-width="1.5"/>
  <line x1="1155" y1="560" x2="1155" y2="590" stroke="#EE5340" stroke-width="1"/>

  <!-- Bottom rule + figure caption -->
  <line x1="60" y1="630" x2="1220" y2="630" stroke="#EE5340" stroke-width="0.5"/>
  <text x="60" y="660" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Fig. {n} &#x2014; Metamorphosis plate {code}</text>

  <!-- Page number -->
  <text x="1220" y="690" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93" text-anchor="end">{page}</text>
</svg>
