<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Warm paper ground -->
  <rect width="1280" height="720" fill="#F9F7F2"/>

  <!-- Graph-paper grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1B1F2A" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Track label -->
  <text x="60" y="50" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0" letter-spacing="2">TRACK A &#x2014; REALISTIC</text>
  <line x1="60" y1="60" x2="1220" y2="60" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Specimen plate card -->
  <rect x="60" y="80" width="1160" height="540" fill="#FFFFFF" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Card header -->
  <text x="90" y="125" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700" fill="#2438E0">[A1]</text>
  <text x="160" y="125" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2438E0">AI Agent SDK for CRM Workflows</text>

  <!-- Level badge + egg glyph -->
  <text x="1050" y="115" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#2438E0">Level 2 &#x2014; larva</text>
  <!-- Larva glyph -->
  <path d="M 1165,100 Q 1175,90 1185,100 Q 1195,110 1205,100" fill="none" stroke="#2438E0" stroke-width="1.5"/>

  <line x1="90" y1="145" x2="1190" y2="145" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Body -->
  <text x="90" y="178" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1B1F2A">Ship a lightweight SDK that lets developers build AI agents operating directly on</text>
  <text x="90" y="205" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1B1F2A">Twenty's open data model. Agents handle lead scoring, follow-up drafting, and pipeline</text>
  <text x="90" y="232" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1B1F2A">stage transitions &#x2014; deterministic CRUD via GraphQL, judgment via the integrator's LLM.</text>

  <!-- Slider strip -->
  <line x1="90" y1="255" x2="1190" y2="255" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Feasibility 4/5 -->
  <text x="90" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Feasibility</text>
  <rect x="210" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="240" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="270" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="300" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="330" y="270" width="28" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <text x="370" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">4/5</text>

  <!-- Evidence 4/5 -->
  <text x="430" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Evidence</text>
  <rect x="530" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="560" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="590" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="620" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="650" y="270" width="28" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <text x="690" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">4/5</text>

  <!-- Impact 4/5 -->
  <text x="750" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Impact</text>
  <rect x="830" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="860" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="890" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="920" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="950" y="270" width="28" height="18" fill="none" stroke="#2438E0" stroke-width="0.5"/>
  <text x="990" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">4/5</text>

  <!-- Disruption 2/5 -->
  <text x="1040" y="285" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55596A">Disruption</text>
  <rect x="1140" y="270" width="28" height="18" fill="#2438E0"/>
  <rect x="1170" y="270" width="28" height="18" fill="#2438E0"/>

  <line x1="90" y1="300" x2="1190" y2="300" stroke="#2438E0" stroke-width="0.5"/>

  <!-- Why now -->
  <text x="90" y="335" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#2438E0">Why now</text>
  <text x="90" y="360" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">LangChain shipped a CRM toolkit; OpenAI function-calling is now GA &#x2014; the agent</text>
  <text x="90" y="383" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">infrastructure to build CRM-native agents exists and enterprises are adopting it.</text>
  <text x="90" y="408" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#2438E0">[1] blog.langchain.dev/crm-agent-toolkit  [2] openai.com/index/function-calling</text>

  <!-- Why us -->
  <text x="90" y="445" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#2438E0">Why us</text>
  <text x="90" y="470" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">Twenty's GraphQL API exposes the full data model; self-hosted Postgres means no data</text>
  <text x="90" y="493" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">leaves the org &#x2014; a unique trust advantage for enterprise AI agent deployments.</text>
  <text x="90" y="518" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#2438E0">[PS] github.com/twentyhq/twenty  [PS] twenty.com/developers</text>

  <!-- First testable step -->
  <line x1="90" y1="538" x2="1190" y2="538" stroke="#2438E0" stroke-width="0.5"/>
  <text x="90" y="568" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#2438E0">First testable step</text>
  <text x="90" y="593" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1B1F2A">Build a reference lead-scoring agent using Twenty's GraphQL API + any function-calling</text>
  <text x="90" y="613" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#55596A">LLM; publish it as an example in the docs within 2 weeks.</text>

  <!-- Bottom rule -->
  <line x1="60" y1="640" x2="1220" y2="640" stroke="#2438E0" stroke-width="0.5"/>
  <text x="60" y="670" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93">Fig. 3 &#x2014; Specimen plate [A1]</text>
  <text x="1220" y="690" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#8A8A93" text-anchor="end">5</text>
</svg>
